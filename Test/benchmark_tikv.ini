[Benchmark]
; TiKV backend benchmark for TODO 2: Distributed routing
; Uses TiKV cluster (docker/tikv/docker-compose.yml) for posting storage.
;
; Small dataset for quick smoke test:
;   10K base vectors, 20K inserts, 4 batches of 5K each
;   4 insert threads + 2 search threads

VectorPath=
QueryPath=
TruthPath=
IndexPath=benchmark_tikv_index
ValueType=Float
Dimension=64
BaseVectorCount=10000
InsertVectorCount=20000
DeleteVectorCount=0
BatchNum=4
TopK=10
NumSearchThreads=2
NumInsertThreads=4
NumQueries=200
DistMethod=L2
Rebuild=true
Resume=-1

; TiKV backend settings
Storage=DYNAMIC
TiKVPDAddresses=127.0.0.1:2379
TiKVKeyPrefix=bench_tikv

[BuildSSDIndex]
Storage=DYNAMIC
TiKVPDAddresses=127.0.0.1:2379
TiKVKeyPrefix=bench_tikv
PostingVectorLimit=118
ReplicaCount=8
IOTimeout=30
