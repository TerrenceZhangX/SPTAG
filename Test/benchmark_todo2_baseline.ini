[Benchmark]
; Baseline benchmark for TODO 2: Lock Routing & Job Scheduling
; Tests concurrent insert + search to stress Split/Merge/Append paths
;
; 50K base vectors → ~10K heads (ratio 0.2)
; Insert 100K in 4 batches of 25K each → many postings will exceed 118 → triggers Split
; 8 insert threads + 4 search threads = concurrent read/write pressure
; Smaller dataset: builds in ~1 min, inserts in ~2–3 min per batch

VectorPath=
QueryPath=
TruthPath=
IndexPath=benchmark_todo2_index
ValueType=Float
Dimension=64
BaseVectorCount=50000
InsertVectorCount=100000
DeleteVectorCount=0
BatchNum=4
TopK=10
NumSearchThreads=4
NumInsertThreads=8
NumQueries=500
DistMethod=L2
Rebuild=true
Resume=-1
