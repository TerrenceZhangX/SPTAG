version: '3.8'

# TiKV cluster for SPTAG/SPFRESH distributed routing tests.
# PD (Placement Driver) + 3 TiKV stores.
# Uses host network so SPTAG on the host can reach stores directly.
#
# Usage:
#   docker compose -f docker/tikv/docker-compose.yml up -d
#   # PD: 127.0.0.1:2379
#   # TiKV stores: 127.0.0.1:20160, 127.0.0.1:20161, 127.0.0.1:20162

services:
  pd:
    image: pingcap/pd:v8.1.0
    container_name: spfresh-pd
    network_mode: host
    command:
      - --name=pd
      - --client-urls=http://0.0.0.0:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-client-urls=http://127.0.0.1:2379
      - --advertise-peer-urls=http://127.0.0.1:2380
      - --data-dir=/data/pd
    volumes:
      - pd_data:/data/pd

  tikv0:
    image: pingcap/tikv:v8.1.0
    container_name: spfresh-tikv0
    network_mode: host
    command:
      - --addr=0.0.0.0:20160
      - --advertise-addr=127.0.0.1:20160
      - --status-addr=0.0.0.0:20180
      - --pd-endpoints=http://127.0.0.1:2379
      - --data-dir=/data/tikv
    volumes:
      - tikv0_data:/data/tikv
    depends_on:
      - pd

  tikv1:
    image: pingcap/tikv:v8.1.0
    container_name: spfresh-tikv1
    network_mode: host
    command:
      - --addr=0.0.0.0:20161
      - --advertise-addr=127.0.0.1:20161
      - --status-addr=0.0.0.0:20181
      - --pd-endpoints=http://127.0.0.1:2379
      - --data-dir=/data/tikv
    volumes:
      - tikv1_data:/data/tikv
    depends_on:
      - pd

  tikv2:
    image: pingcap/tikv:v8.1.0
    container_name: spfresh-tikv2
    network_mode: host
    command:
      - --addr=0.0.0.0:20162
      - --advertise-addr=127.0.0.1:20162
      - --status-addr=0.0.0.0:20182
      - --pd-endpoints=http://127.0.0.1:2379
      - --data-dir=/data/tikv
    volumes:
      - tikv2_data:/data/tikv
    depends_on:
      - pd

volumes:
  pd_data:
  tikv0_data:
  tikv1_data:
  tikv2_data:
