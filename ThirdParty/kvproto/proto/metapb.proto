// Extracted from https://github.com/pingcap/kvproto
// Minimal definitions needed for SPANN TiKV integration.

syntax = "proto3";
package metapb;

option java_package = "org.tikv.kvproto";

message Cluster {
    uint64 id = 1;
    uint64 max_peer_count = 2;
}

message Store {
    uint64 id = 1;
    string address = 2;
    StoreState state = 3;
    repeated StoreLabel labels = 4;
    string version = 5;
    string status_address = 6;
    string git_hash = 7;
    string deploy_path = 8;
    int64 physically_destroyed = 9;
    string peer_address = 10;
}

enum StoreState {
    Up = 0;
    Offline = 1;
    Tombstone = 2;
}

message StoreLabel {
    string key = 1;
    string value = 2;
}

message Region {
    uint64 id = 1;
    bytes start_key = 2;
    bytes end_key = 3;
    RegionEpoch region_epoch = 4;
    repeated Peer peers = 5;
    bytes encryption_meta = 6;
    bool is_in_flashback = 7;
}

message RegionEpoch {
    uint64 conf_ver = 1;
    uint64 version = 2;
}

message Peer {
    uint64 id = 1;
    uint64 store_id = 2;
    PeerRole role = 3;
    bool is_witness = 4;
}

enum PeerRole {
    Voter = 0;
    Learner = 1;
    IncomingVoter = 2;
    DemotingVoter = 3;
}
