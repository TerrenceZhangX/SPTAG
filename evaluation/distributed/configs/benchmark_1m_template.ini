# SPTAG Distributed Benchmark INI Template — 1M scale
#
# Used by run_distributed.sh to generate per-node configs.
# Fields overridden by the script: IndexPath, TiKVPDAddresses,
# Rebuild, and the entire [Router] section.

[Benchmark]
VectorPath=/mnt/nvme/vectors.1b.fbin
QueryPath=/mnt/nvme/query.1k.fbin
TruthPath=none
IndexPath=PLACEHOLDER
ValueType=Float
Dimension=64
BaseVectorCount=990000
InsertVectorCount=10000
DeleteVectorCount=0
BatchNum=10
TopK=5
NumSearchThreads=8
NumInsertThreads=8
NumQueries=200
DistMethod=L2
Rebuild=true
BuildOnly=false
Resume=-1
Layers=2

Storage=TIKVIO
TiKVPDAddresses=PLACEHOLDER
TiKVKeyPrefix=bench1m_dist

[SelectHead]
ParallelBKTBuild=true

[BuildHead]
ParallelBKTBuild=true

[BuildSSDIndex]
NumberOfThreads=8
PostingPageLimit=12
BufferLength=8
VersionCacheTTLMs=60000
VersionCacheMaxChunks=10000

[Router]
RouterEnabled=true
RouterLocalNodeIndex=0
RouterNodeAddrs=PLACEHOLDER
RouterNodeStores=PLACEHOLDER
