; 1B RocksDB backend benchmark, Layers=1 (n1: 10.11.0.7)
; Tuned RocksDB 8.11.3 + Folly coroutine MultiGet + liburing 2.6
; No DirectIO (best perf per ablation study)
[Benchmark]
VectorPath=/mnt_ssd/data/sift1b/bigann_base.u8bin
QueryPath=/mnt_ssd/data/sift1b/query.10K.u8bin
TruthPath=/mnt_ssd/data/sift1b/bigann_truth.bin
IndexPath=/mnt_ssd/data/proidx_1b_rocksdb_L1/spann_index
ValueType=UInt8
Dimension=128
BaseVectorCount=900000000
InsertVectorCount=100000000
DeleteVectorCount=0
BatchNum=10
TopK=5
NumSearchThreads=4
NumInsertThreads=16
NumQueries=200
DistMethod=L2
Rebuild=true
BuildOnly=false
Resume=-1
Layers=1

Storage=ROCKSDBIO
UseDirectIO=false
RocksDBBlockCacheMB=4096
RocksDBBlobCacheMB=26624
RocksDBMaxSubCompactions=4
RocksDBAsyncIO=true
RocksDBLowPriorityCompaction=true

[SelectHead]
ParallelBKTBuild=true

[BuildHead]
ParallelBKTBuild=true

[BuildSSDIndex]
VersionCacheTTLMs=0
VersionCacheMaxChunks=100000
UseMultiChunkPosting=false
AppendThreadNum=48
AsyncMergeInSearch=true
LatencyLimit=100
