; 1B TiKV backend benchmark on single node (n2: 10.11.0.5)
; 1 PD + 1 TiKV, max-replicas=1
[Benchmark]
VectorPath=/mnt_ssd/data/sift1b/bigann_base.u8bin
QueryPath=/mnt_ssd/data/sift1b/query.10K.u8bin
TruthPath=/mnt_ssd/data/sift1b/bigann_truth.bin
IndexPath=/mnt_ssd/data/proidx_1b_tikv/spann_index
ValueType=UInt8
Dimension=128
BaseVectorCount=900000000
InsertVectorCount=100000000
DeleteVectorCount=0
BatchNum=10
TopK=5
NumSearchThreads=4
NumInsertThreads=16
NumQueries=200
DistMethod=L2
Rebuild=true
BuildOnly=false
Resume=-1
Layers=2

Storage=TIKVIO
TiKVKeyPrefix=sptag_1b_tikv
TiKVPDAddresses=10.11.0.5:2379

[SelectHead]
ParallelBKTBuild=true

[BuildHead]
ParallelBKTBuild=true

[BuildSSDIndex]
VersionCacheTTLMs=0
VersionCacheMaxChunks=100000
UseMultiChunkPosting=false
AppendThreadNum=48
AsyncMergeInSearch=true
LatencyLimit=100
